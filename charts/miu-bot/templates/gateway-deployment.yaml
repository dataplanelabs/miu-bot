apiVersion: apps/v1
kind: Deployment
metadata:
  name: miubot-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "miu-bot.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "miu-bot.gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "miu-bot.labels" . | nindent 8 }}
        {{- include "miu-bot.gateway.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.bots }}
        checksum/bots: {{ include (print $.Template.BasePath "/bots-configmap.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: gateway
          image: {{ include "miu-bot.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.bots }}
          command: ["miubot", "serve", "--role", "gateway", "--bots-config", "/etc/miu-bot/bots.yaml"]
          {{- else }}
          command: ["miubot", "serve", "--role", "gateway"]
          {{- end }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
              name: http
          envFrom:
            - configMapRef:
                name: miubot-config
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- if .Values.bots }}
          volumeMounts:
            - name: bots-config
              mountPath: /etc/miu-bot
              readOnly: true
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "{{ .Values.gateway.preStopSleepSeconds | default 5 }}"]
          {{- with .Values.gateway.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
      {{- if .Values.bots }}
      volumes:
        - name: bots-config
          configMap:
            name: miubot-bots
      {{- end }}
