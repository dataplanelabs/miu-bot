services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: miubot
      POSTGRES_USER: miubot
      POSTGRES_PASSWORD: miubot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miubot"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      DB: postgres12
      POSTGRES_SEEDS: temporal-db
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      DB_PORT: 5432
    depends_on:
      temporal-db:
        condition: service_healthy

  migrate:
    build: .
    command: miubot db migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MIU_BOT_DATABASE__URL: postgresql://miubot:miubot@postgres:5432/miubot
    restart: "no"

  gateway:
    build: .
    command: miubot serve --role gateway
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports:
      - "18790:18790"
    env_file: .env
    environment:
      MIU_BOT_DATABASE__URL: postgresql://miubot:miubot@postgres:5432/miubot
      MIU_BOT_BACKEND__TYPE: postgres
      MIU_BOT_TEMPORAL__SERVER_URL: temporal:7233

  worker:
    build: .
    command: miubot serve --role worker
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 2
    env_file: .env
    environment:
      MIU_BOT_DATABASE__URL: postgresql://miubot:miubot@postgres:5432/miubot
      MIU_BOT_BACKEND__TYPE: postgres
      MIU_BOT_DISPATCH__GATEWAY_URL: http://gateway:18790
      MIU_BOT_TEMPORAL__SERVER_URL: temporal:7233

volumes:
  pgdata:
  temporal-pgdata:
