name: Release

on:
  push:
    branches: [main]
    paths:
      - 'miu_bot/**'
      - 'Dockerfile'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0) - manual docker build'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # === AUTO: Tag bump + release + docker build ===
  release:
    name: Tag and Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_MUNMIU_PRIVATE_KEY }}

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ steps.app_token.outputs.token }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          token: ${{ steps.app_token.outputs.token }}

  auto-deploy:
    name: Auto Deploy
    needs: release
    if: github.event_name == 'push' && needs.release.outputs.new_tag
    uses: dataplanelabs/.github/.github/workflows/docker-harbor.yml@main
    secrets: inherit
    with:
      image_name: dataplanelabs/miu-bot
      version: ${{ needs.release.outputs.new_tag }}

  # === MANUAL: Docker build with custom version ===
  manual-deploy:
    name: Manual Deploy
    if: github.event_name == 'workflow_dispatch'
    uses: dataplanelabs/.github/.github/workflows/docker-harbor.yml@main
    secrets: inherit
    with:
      image_name: dataplanelabs/miu-bot
      version: ${{ inputs.version }}
