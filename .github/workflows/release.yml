name: Release

on:
  push:
    branches: [main]
    paths:
      - 'miu_bot/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'charts/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0) - manual docker build'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # === AUTO: Tag bump + release + docker build ===
  release:
    name: Tag and Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_MUNMIU_PRIVATE_KEY }}

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ steps.app_token.outputs.token }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          token: ${{ steps.app_token.outputs.token }}

  auto-deploy:
    name: Build and Push Docker Image
    needs: release
    if: github.event_name == 'push' && needs.release.outputs.new_tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.new_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  publish-chart:
    name: Publish Helm Chart
    needs: release
    if: github.event_name == 'push' && needs.release.outputs.new_tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if chart changed
        id: check
        run: |
          if git diff --name-only HEAD~1 | grep -q '^charts/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::No chart changes — skipping publish"
          fi

      - name: Set up Helm
        if: steps.check.outputs.changed == 'true'
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Log in to GHCR for Helm
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package and push chart
        if: steps.check.outputs.changed == 'true'
        run: |
          CHART_VERSION="${{ needs.release.outputs.new_tag }}"
          CHART_VERSION="${CHART_VERSION#v}"

          helm package ./charts/miu-bot \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_VERSION}"

          helm push "miu-bot-${CHART_VERSION}.tgz" \
            oci://${{ env.REGISTRY }}/dataplanelabs/charts

      - name: Verify push
        if: steps.check.outputs.changed == 'true'
        run: |
          CHART_VERSION="${{ needs.release.outputs.new_tag }}"
          CHART_VERSION="${CHART_VERSION#v}"

          helm show chart \
            oci://${{ env.REGISTRY }}/dataplanelabs/charts/miu-bot \
            --version "${CHART_VERSION}"

  # === MANUAL: Docker build with custom version ===
  manual-deploy:
    name: Manual Build and Push
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  manual-publish-chart:
    name: Manual Publish Chart
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Log in to GHCR for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package and push chart
        run: |
          CHART_VERSION="${{ inputs.version }}"
          CHART_VERSION="${CHART_VERSION#v}"

          helm package ./charts/miu-bot \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_VERSION}"

          helm push "miu-bot-${CHART_VERSION}.tgz" \
            oci://${{ env.REGISTRY }}/dataplanelabs/charts
