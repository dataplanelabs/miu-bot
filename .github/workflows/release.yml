name: Release

on:
  push:
    branches: [main]
    paths:
      - 'miu_bot/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'charts/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0) - manual docker build'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # === AUTO: Tag bump + release + docker build ===
  release:
    name: Tag and Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_MUNMIU_PRIVATE_KEY }}

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ steps.app_token.outputs.token }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          token: ${{ steps.app_token.outputs.token }}

  auto-deploy:
    name: Auto Deploy
    needs: release
    if: github.event_name == 'push' && needs.release.outputs.new_tag
    uses: dataplanelabs/.github/.github/workflows/docker-harbor.yml@main
    secrets: inherit
    with:
      image_name: dataplanelabs/miu-bot
      version: ${{ needs.release.outputs.new_tag }}

  publish-chart:
    name: Publish Helm Chart
    needs: release
    if: github.event_name == 'push' && needs.release.outputs.new_tag
    runs-on: k8s-runners
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Setup Harbor auth
        run: |
          mkdir -p ~/.docker
          if [ -f "/run/secrets/docker/config.json" ]; then
            cp /run/secrets/docker/config.json ~/.docker/config.json
            echo "Using pre-mounted Docker credentials"
          else
            echo "${{ secrets.HARBOR_PASSWORD }}" | \
            helm registry login harbor.dataplanelabs.com \
              --username ${{ secrets.HARBOR_USERNAME }} \
              --password-stdin
          fi

      - name: Package and push chart
        run: |
          # Strip 'v' prefix for Helm semver (v0.3.0 -> 0.3.0)
          CHART_VERSION="${{ needs.release.outputs.new_tag }}"
          CHART_VERSION="${CHART_VERSION#v}"

          helm package ./charts/miu-bot \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_VERSION}"

          helm push "miu-bot-${CHART_VERSION}.tgz" \
            oci://harbor.dataplanelabs.com/dataplanelabs/charts

      - name: Verify push
        run: |
          CHART_VERSION="${{ needs.release.outputs.new_tag }}"
          CHART_VERSION="${CHART_VERSION#v}"

          helm show chart \
            oci://harbor.dataplanelabs.com/dataplanelabs/charts/miu-bot \
            --version "${CHART_VERSION}"

  # === MANUAL: Docker build with custom version ===
  manual-deploy:
    name: Manual Deploy
    if: github.event_name == 'workflow_dispatch'
    uses: dataplanelabs/.github/.github/workflows/docker-harbor.yml@main
    secrets: inherit
    with:
      image_name: dataplanelabs/miu-bot
      version: ${{ inputs.version }}

  manual-publish-chart:
    name: Manual Publish Chart
    if: github.event_name == 'workflow_dispatch'
    runs-on: k8s-runners
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Setup Harbor auth
        run: |
          mkdir -p ~/.docker
          if [ -f "/run/secrets/docker/config.json" ]; then
            cp /run/secrets/docker/config.json ~/.docker/config.json
            echo "Using pre-mounted Docker credentials"
          else
            echo "${{ secrets.HARBOR_PASSWORD }}" | \
            helm registry login harbor.dataplanelabs.com \
              --username ${{ secrets.HARBOR_USERNAME }} \
              --password-stdin
          fi

      - name: Package and push chart
        run: |
          CHART_VERSION="${{ inputs.version }}"
          CHART_VERSION="${CHART_VERSION#v}"

          helm package ./charts/miu-bot \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_VERSION}"

          helm push "miu-bot-${CHART_VERSION}.tgz" \
            oci://harbor.dataplanelabs.com/dataplanelabs/charts
