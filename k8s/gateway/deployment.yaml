apiVersion: apps/v1
kind: Deployment
metadata:
  name: miubot-gateway
  namespace: miubot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miubot-gateway
  template:
    metadata:
      labels:
        app: miubot-gateway
    spec:
      containers:
        - name: gateway
          image: miubot:latest
          command: ["miubot", "serve", "--role", "gateway"]
          ports:
            - containerPort: 18790
          envFrom:
            - configMapRef:
                name: miubot-config
            - secretRef:
                name: miubot-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 18790
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 18790
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
