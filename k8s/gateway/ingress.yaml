apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: miubot-gateway
  namespace: miubot
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: miubot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: miubot-gateway
                port:
                  number: 18790
  tls:
    - hosts:
        - miubot.example.com
      secretName: miubot-tls
