apiVersion: apps/v1
kind: Deployment
metadata:
  name: miubot-worker
  namespace: miubot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: miubot-worker
  template:
    metadata:
      labels:
        app: miubot-worker
    spec:
      containers:
        - name: worker
          image: harbor.dataplanelabs.com/dataplanelabs/miu-bot:latest
          command: ["miubot", "serve", "--role", "worker"]
          envFrom:
            - configMapRef:
                name: miubot-config
            - secretRef:
                name: miubot-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
