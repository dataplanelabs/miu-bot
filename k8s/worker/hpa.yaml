apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: miubot-worker
  namespace: miubot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: miubot-worker
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
